<footer class="site-footer h-card">
  <data class="u-url" href="{{ '/' | relative_url }}"></data>

  <div class="wrapper">
    <h2 class="footer-heading" aria-label="{{ site.title }}">
      <img class="brand-logo-img brand-logo-img--footer" src="{{ '/assets/logo/toolog-logo-header.png' | relative_url }}" alt="{{ site.title }}" width="220" height="48" />
    </h2>

    <div class="footer-col-wrapper">
      <div class="footer-col footer-col-1">
        <ul class="contact-list">
          <li class="p-name">{{ site.title }}</li>
        </ul>
      </div>

      <div class="footer-col footer-col-2">
        {%- include social.html -%}
      </div>

      <div class="footer-col footer-col-3">
        <p>{{ site.description | escape }}</p>
      </div>
    </div>
  </div>
</footer>
