name: i18n review queue (1h)

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  queue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Find due review items (>=1h)
        run: python scripts/i18n_due_reviews.py

      - name: Open review issues for due items
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = '.automation/i18n-due.json';
            if (!fs.existsSync(path)) {
              core.info('No due file');
              return;
            }
            const due = JSON.parse(fs.readFileSync(path, 'utf8'));
            if (!due.length) {
              core.info('No due reviews');
              return;
            }

            for (const item of due) {
              const slug = item.slug;
              const title = `[i18n-review] ${slug}`;
              const existing = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100
              });
              if (existing.find(i => i.title === title)) {
                core.info(`Issue exists: ${title}`);
                continue;
              }

              const body = [
                `KO tool detected: \`${item.ko_source}\``,
                `Detected at (UTC): ${item.detectedAt}`,
                '',
                'Action checklist:',
                '- [ ] Polish EN draft',
                '- [ ] Polish JA draft',
                '- [ ] Verify SEO title/description naturalness',
                '- [ ] Verify related links and locale terms',
                '- [ ] Final deploy check'
              ].join('\n');

              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body
              });
              core.info(`Opened: ${title}`);
            }
