<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">중고거래 가격 제안 문구 생성기</title>
  <desc id="desc">중고거래 가격 제안, 수락, 거절 메시지를 만드는 도구 썸네일</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <rect x="68" y="72" width="1064" height="486" rx="28" fill="#ffffff" opacity="0.96"/>
  <rect x="108" y="122" width="240" height="52" rx="26" fill="#fb923c"/>
  <text x="228" y="156" text-anchor="middle" font-size="28" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#fff">TOOLOG TOOL</text>
  <text x="108" y="244" font-size="64" font-weight="700" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#111827">중고거래 가격 제안</text>
  <text x="108" y="322" font-size="64" font-weight="700" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#111827">문구 생성기</text>
  <text x="108" y="392" font-size="30" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#4b5563">가격 제안 · 수락 · 거절 · 예약 요청 메시지 정리</text>
  <g transform="translate(780 150)">
    <rect x="0" y="0" width="250" height="300" rx="28" fill="#fff7ed" stroke="#fdba74" stroke-width="4"/>
    <rect x="26" y="34" width="118" height="38" rx="19" fill="#fed7aa"/>
    <text x="85" y="59" text-anchor="middle" font-size="20" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#9a3412">정중 제안</text>
    <text x="28" y="118" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#7c2d12">안녕하세요.</text>
    <text x="28" y="156" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#7c2d12">10만 원 조건으로</text>
    <text x="28" y="194" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#7c2d12">거래 가능하실까요?</text>
    <text x="28" y="232" font-size="24" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#7c2d12">오늘 저녁 직거래 가능해요.</text>
  </g>
  <g transform="translate(950 408)">
    <circle cx="0" cy="0" r="54" fill="#fb923c"/>
    <text x="0" y="12" text-anchor="middle" font-size="58" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" fill="#fff">₩</text>
  </g>
</svg>
