<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="물타기 계산기 썸네일">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="90" y="90" width="1020" height="450" rx="28" fill="#0b1222" stroke="#60a5fa" stroke-width="3"/>
  <text x="140" y="190" fill="#e2e8f0" font-size="64" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-weight="700">물타기 계산기</text>
  <text x="140" y="255" fill="#93c5fd" font-size="34" font-family="Pretendard, Apple SD Gothic Neo, sans-serif">주식 평단가 · 추가매수 목표가 계산</text>

  <g transform="translate(140 315)">
    <rect width="300" height="120" rx="16" fill="#111827" stroke="#334155"/>
    <text x="24" y="48" fill="#94a3b8" font-size="24" font-family="sans-serif">현재 평단가</text>
    <text x="24" y="92" fill="#f8fafc" font-size="36" font-family="sans-serif" font-weight="700">50,000원</text>
  </g>
  <g transform="translate(470 315)">
    <rect width="300" height="120" rx="16" fill="#111827" stroke="#334155"/>
    <text x="24" y="48" fill="#94a3b8" font-size="24" font-family="sans-serif">추가 매수가</text>
    <text x="24" y="92" fill="#f8fafc" font-size="36" font-family="sans-serif" font-weight="700">40,000원</text>
  </g>
  <g transform="translate(800 315)">
    <rect width="260" height="120" rx="16" fill="#052e16" stroke="#22c55e"/>
    <text x="22" y="48" fill="#86efac" font-size="22" font-family="sans-serif">새 평단가</text>
    <text x="22" y="92" fill="#dcfce7" font-size="34" font-family="sans-serif" font-weight="700">45,000원</text>
  </g>
</svg>
